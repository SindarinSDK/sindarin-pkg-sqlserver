services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStr0ngPass!"
      MSSQL_PID: Developer
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "SA", "-P", "YourStr0ngPass!", "-Q", "SELECT 1", "-b", "-C"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
