name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: 'YourStr0ngPass!'
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'YourStr0ngPass!' -Q 'SELECT 1' -b -C"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build gperf unixodbc-dev libkrb5-dev

      - name: Cache FreeTDS build
        uses: actions/cache@v4
        with:
          path: freetds-install
          key: freetds-branch-1_4-linux-x64-v4

      - name: Build FreeTDS
        run: |
          if [ -d "freetds-install/lib" ] && [ -f "freetds-install/include/sybdb.h" ]; then
            echo "Using cached FreeTDS build"
          else
            git clone --depth=1 --branch Branch-1_4 https://github.com/FreeTDS/freetds.git
            cmake -S freetds -B freetds/build \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$(pwd)/freetds-install \
              -DBUILD_SHARED_LIBS=OFF \
              -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
              -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=ON \
              -DENABLE_ODBC=OFF \
              -DBUILD_TESTING=OFF
            cmake --build freetds/build -j$(nproc)
            cmake --install freetds/build
          fi

      - name: Package libs
        run: |
          mkdir -p libs/linux/lib libs/linux/include
          find freetds-install/lib -maxdepth 1 -name "*.a" -exec cp {} libs/linux/lib/ \;
          cp -r freetds-install/include/* libs/linux/include/
          echo "linux" > libs/linux/PLATFORM
          echo "Packaged libraries:"
          ls libs/linux/lib/

      - name: Install FreeTDS to system paths
        run: |
          sudo cp -r freetds-install/include/* /usr/local/include/
          sudo find freetds-install/lib -maxdepth 1 -name "*.a" -exec cp {} /usr/local/lib/ \;

      - name: Setup Prerequisites
        uses: SindarinSDK/sindarin-pipelines/.github/actions/setup-prereqs@main

      - name: Install Sindarin
        uses: SindarinSDK/sindarin-pipelines/.github/actions/install-sindarin@main
        with:
          github-token: ${{ github.token }}

      - name: Install dependencies
        uses: SindarinSDK/sindarin-pipelines/.github/actions/install-deps@main
        with:
          github-token: ${{ github.token }}

      - name: Run tests
        shell: bash
        env:
          MSSQL_HOST: localhost
          MSSQL_PORT: '1433'
          MSSQL_DATABASE: master
          MSSQL_USER: SA
          MSSQL_PASSWORD: 'YourStr0ngPass!'
        run: make test

      - name: Diagnose compile errors
        if: failure()
        uses: SindarinSDK/sindarin-pipelines/.github/actions/diagnose-pkg@main
